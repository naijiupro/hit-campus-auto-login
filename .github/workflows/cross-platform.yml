name: cross-platform

on:
  push:
    paths: ["cross-platform/**"]
  pull_request:
    paths: ["cross-platform/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: cross-platform

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo build --release -p hit-auto-login
      - name: Package Linux release
        run: |
          mkdir -p dist/release
          cp target/release/hit-auto-login installer/linux/
          chmod +x installer/linux/hit-auto-login installer/linux/install.sh installer/linux/uninstall.sh
          tar -C installer/linux -czf dist/release/HITAutoLogin-Linux-x86_64.tar.gz hit-auto-login install.sh uninstall.sh README.txt
      - uses: actions/upload-artifact@v4
        with:
          name: HITAutoLogin-Linux-x86_64
          path: cross-platform/dist/release/HITAutoLogin-Linux-x86_64.tar.gz

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo build --release -p hit-auto-login
      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/release | Out-Null
          Copy-Item target/release/hit-auto-login.exe dist/release/hit-auto-login.exe
          Compress-Archive -Path dist/release/hit-auto-login.exe -DestinationPath dist/release/HITAutoLogin-Windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: HITAutoLogin-Windows-x64
          path: cross-platform/dist/release/HITAutoLogin-Windows-x64.zip
