name: cross-platform

on:
  push:
    paths: ["cross-platform/**"]
  pull_request:
    paths: ["cross-platform/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: cross-platform

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo build --release -p hit-auto-login
      - uses: actions/upload-artifact@v4
        with:
          name: HITAutoLogin-Linux-x86_64
          path: cross-platform/target/release/hit-auto-login

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo build --release -p hit-auto-login
      - uses: actions/upload-artifact@v4
        with:
          name: HITAutoLogin-Windows-x64
          path: cross-platform/target/release/hit-auto-login.exe
